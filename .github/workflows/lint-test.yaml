name: Lint and Test Charts

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - labeled
    paths:
      - 'charts/**'
      - '.github/workflows/lint-test.yaml'
      - 'test-deps.yaml'
      - '!charts/**/README.md'
      - '!charts/**/README.md.gotmpl'
      - '!charts/**/docs/**'
  pull_request_review:
    types:
      - submitted

env:
  TEST_ALL_CHARTS: ${{ contains(github.event.pull_request.labels.*.name, 'ci-test-all') && 'true' || 'false' }}
  HELM_VERSION: v4.1.1
  CHART_TESTING_VERSION: v3.14.0
jobs:
  list-changed:
    runs-on: ubuntu-slim
    if: >-
      (github.event_name == 'pull_request_review' &&
        github.event.review.state == 'approved' &&
        github.event.pull_request.user.login == 'github-actions[bot]') ||
      github.event_name != 'pull_request_review'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: List changed files
        id: pr-changes
        uses: Alfresco/alfresco-build-tools/.github/actions/github-list-changes@v18.15.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: ${{ env.CHART_TESTING_VERSION }}

      - name: List changed charts and create matrix
        id: set-matrix
        run: |
          if [[ "$TEST_ALL_CHARTS" == "true" ]] || echo "${{ steps.pr-changes.outputs.all_changed_files }}" | grep -q '^test-deps.yaml$'; then
            charts=$(make list-charts)
          else
            charts=$(ct list-changed --config ct.yaml)
          fi

          if [[ -n "$charts" ]]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
            # Convert newline-separated list to JSON array
            matrix=$(echo "$charts" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "matrix=$matrix" >> $GITHUB_OUTPUT
            echo "Changed charts:"
            echo "$charts"
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "No charts changed"
          fi

  lint:
    needs: list-changed
    if: needs.list-changed.outputs.has-changes == 'true'
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Unit Test plugin for Helm
        env:
          HELM_UNITTEST_VERSION: v1.0.3
        run: >-
          helm plugin install https://github.com/helm-unittest/helm-unittest
          --version $HELM_UNITTEST_VERSION
          --verify=false

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: ${{ env.CHART_TESTING_VERSION }}

      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml ${{ env.TEST_ALL_CHARTS == 'true' && '--all' || '' }}

  install:
    needs: list-changed
    if: needs.list-changed.outputs.has-changes == 'true' && ! github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    env:
      INSTALL_NAMESPACE: alfresco
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.list-changed.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: ${{ env.CHART_TESTING_VERSION }}

      - name: Create kind cluster
        uses: Alfresco/alfresco-build-tools/.github/actions/setup-kind@v18.15.1
        with:
          ingress-nginx-ref: skip

      - name: Login to Quay.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: quay.io
          username: ${{ secrets.quay_username }}
          password: ${{ secrets.quay_password }}

      - name: Get Activiti License from S3
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ACSLICENSE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_ACSLICENSE_SECRET_ACCESS_KEY }}
        run: aws s3 cp s3://aps-licenses/single-tenant/activiti.lic /tmp/activiti.lic

      - name: Prepare namespace for install
        run: |
          kubectl create ns "$INSTALL_NAMESPACE"
          kubectl create secret generic quay-registry-secret --from-file=.dockerconfigjson="${HOME}"/.docker/config.json --type=kubernetes.io/dockerconfigjson -n "$INSTALL_NAMESPACE"
          kubectl create secret generic broker-secret --from-literal=BROKER_URL="failover:(nio://activemq:61616)?timeout=3000" --from-literal=BROKER_USERNAME=admin --from-literal=BROKER_PASSWORD=admin -n "$INSTALL_NAMESPACE"
          kubectl create secret generic aps-license --from-file=activiti.lic=/tmp/activiti.lic -n "$INSTALL_NAMESPACE"

      - name: Prepare charts mocks for testing
        run: |
          if [ -d "${{ matrix.chart }}/ci/kustomize/" ]; then
            echo "Prepare mocks for ${{ matrix.chart }}"
            pushd "${{ matrix.chart }}/ci/kustomize/"
            kubectl kustomize --enable-helm . | \
              kubectl -n "$INSTALL_NAMESPACE" apply -f -
            popd
          fi

      - name: Setup test dependencies
        run: ./scripts/ci-deps.sh setup ${{ matrix.chart }} "$INSTALL_NAMESPACE"

      - name: Run chart-testing (install)
        run: >-
          ct install --config ct.yaml
          --namespace "$INSTALL_NAMESPACE"
          --charts ${{ matrix.chart }}
