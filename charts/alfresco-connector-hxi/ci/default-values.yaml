# Both live-ingester and prediction-applier gate /actuator/health/readiness on
# reaching the ACS repository, which chart-testing points at the public
# https://httpbin.org/status/204 as a stand-in; when that third-party endpoint
# is slow or unavailable the probe never turns healthy. Relax to a plain TCP
# check so the workload is validated as started instead.
liveIngester:
  replicaCount: 1
  resources:
    requests:
      cpu: "0.01"
      memory: "128Mi"
    limits:
      cpu: "1"
      memory: "500Mi"
  livenessProbe:
    httpGet: null
    tcpSocket:
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 30
  readinessProbe:
    httpGet: null
    tcpSocket:
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 30
bulkIngester:
  resources:
    requests:
      cpu: "0.01"
      memory: "128Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
predictionApplier:
  replicaCount: 1
  resources:
    requests:
      cpu: "0.01"
      memory: "128Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  livenessProbe:
    httpGet: null
    tcpSocket:
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 30
  readinessProbe:
    httpGet: null
    tcpSocket:
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 30
db:
  url: jdbc:postgresql://postgresql:5432/alfresco
messageBroker:
  url: nio://activemq-broker:61616
  username: admin
  password: admin
repository:
  url: https://httpbin.org/status/204
  versionOverride: '23.3.0'
ats:
  sfsUrl: http://alfresco-transform-services-sfs
hxi:
  hxInsightPredictionsUrl: http://hxi-predictions
