---
suite: test alfresco-search-service persistence
templates:
  - pvc.yaml
tests:
  - it: should not render a pvc when persistence is disabled
    set:
      persistence:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render a pvc when existingClaim is set
    set:
      persistence:
        enabled: true
        existingClaim: existing-claim
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a pvc with dynamic claim name
    set:
      persistence:
        enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: solr-default-pvc

  - it: should render a pvc with provided storage class
    set:
      persistence:
        enabled: true
        storageClass: fast
    asserts:
      - equal:
          path: metadata.name
          value: solr-fast-pvc
      - equal:
          path: spec.storageClassName
          value: fast

  - it: should render pvc without annotations by default
    set:
      persistence:
        enabled: true
    asserts:
      - isNull:
          path: metadata.annotations

  - it: should render pvc with global annotations
    set:
      persistence:
        enabled: true
      global:
        persistence:
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
    asserts:
      - equal:
          path: metadata.annotations
          value:
            storageclass.kubernetes.io/is-default-class: "true"

  - it: should render pvc with local annotations
    set:
      persistence:
        enabled: true
        annotations:
          example.com/local: local-value
    asserts:
      - equal:
          path: metadata.annotations
          value:
            example.com/local: local-value

  - it: should merge global and local annotations with local taking precedence
    set:
      persistence:
        enabled: true
        annotations:
          example.com/key: local-value
          example.com/local-only: local-only
      global:
        persistence:
          annotations:
            example.com/key: global-value
            example.com/global-only: global-only
    asserts:
      - equal:
          path: metadata.annotations
          value:
            example.com/key: local-value
            example.com/local-only: local-only
            example.com/global-only: global-only
