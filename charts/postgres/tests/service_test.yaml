---
suite: test postgres service
templates:
  - service.yaml
tests:
  - it: should render service annotations
    set:
      primary.service.annotations:
        service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            service.beta.kubernetes.io/aws-load-balancer-internal: "true"
