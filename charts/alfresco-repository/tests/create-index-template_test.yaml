---
suite: test create-index-template init-container
templates:
  - deployment.yaml
values: &test_values
  - values/test_values.yaml
tests:
  - it: should not render create-index-template init-container by default
    asserts:
      - notContains:
          path: spec.template.spec.initContainers
          content:
            name: create-index-template

  - it: should render create-index-template init-container when enabled
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: create-index-template

  - it: should use configured image when enabled
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          images:
            basic:
              repository: custom/curl
              tag: "9.0.0"
              pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: create-index-template
      - equal:
          path: spec.template.spec.initContainers[1].image
          value: "custom/curl:9.0.0"
      - equal:
          path: spec.template.spec.initContainers[1].imagePullPolicy
          value: Always

  - it: should default to the curl image for basic auth
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].image
          value: "curlimages/curl:8.11.0"
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '-sfS'

  - it: should fail rendering for an unknown auth mode
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          auth:
            mode: bogus
    asserts:
      - failedTemplate:
          errorMessage: initContainers.createIndexTemplate.auth.mode must be "basic" or "iam", got "bogus"

  - it: should render correct resources when enabled
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          resources:
            basic:
              limits:
                cpu: "500m"
                memory: "50Mi"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: create-index-template
      - equal:
          path: spec.template.spec.initContainers[1].resources.limits.cpu
          value: "500m"
      - equal:
          path: spec.template.spec.initContainers[1].resources.limits.memory
          value: "50Mi"

  - it: should default to 20Mi for basic auth
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].resources.limits.memory
          value: "20Mi"

  - it: should default to 256Mi for iam auth
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          auth:
            mode: iam
            aws:
              region: us-east-1
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].resources.limits.memory
          value: "256Mi"

  - it: should use configured template name and index name
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          templateName: custom-tpl
          indexName: custom-index
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: create-index-template
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*_index_template/RELEASE-NAME-custom-tpl.*'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"index_patterns": \["custom-index"\].*'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"max_result_window": 10000.*'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"limit": 7500.*'

  - it: should use default max_result_window and totalFieldsLimit when not specified
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          numberOfShards: 2
          numberOfReplicas: 1
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: create-index-template
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"index_patterns": \["alfresco"\].*'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"number_of_shards": 2.*'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"number_of_replicas": 1.*'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"max_result_window": 10000.*'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"limit": 7500.*'

  - it: should use init container overrides for max_result_window and totalFieldsLimit
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          maxResultWindow: 30000
          totalFieldsLimit: 12000
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: create-index-template
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"max_result_window": 30000.*'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"limit": 12000.*'

  - it: should include elasticsearch credentials from search configuration
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: create-index-template
      - equal:
          path: spec.template.spec.initContainers[1].env[0].name
          value: SPRING_ELASTICSEARCH_REST_URIS
      - equal:
          path: spec.template.spec.initContainers[1].env[0].valueFrom.configMapKeyRef.name
          value: RELEASE-NAME-alfresco-search
      - equal:
          path: spec.template.spec.initContainers[1].env[0].valueFrom.configMapKeyRef.key
          value: SEARCH_URL
      - equal:
          path: spec.template.spec.initContainers[1].env[1].name
          value: SPRING_ELASTICSEARCH_REST_USERNAME
      - equal:
          path: spec.template.spec.initContainers[1].env[1].valueFrom.secretKeyRef.name
          value: RELEASE-NAME-alfresco-search
      - equal:
          path: spec.template.spec.initContainers[1].env[1].valueFrom.secretKeyRef.key
          value: ELASTICSEARCH_USERNAME
      - equal:
          path: spec.template.spec.initContainers[1].env[2].name
          value: SPRING_ELASTICSEARCH_REST_PASSWORD
      - equal:
          path: spec.template.spec.initContainers[1].env[2].valueFrom.secretKeyRef.name
          value: RELEASE-NAME-alfresco-search
      - equal:
          path: spec.template.spec.initContainers[1].env[2].valueFrom.secretKeyRef.key
          value: ELASTICSEARCH_PASSWORD

  - it: should default to the awscurl image for iam auth
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          auth:
            mode: iam
            aws:
              region: us-east-1
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].image
          value: "ghcr.io/okigan/awscurl:v0.44"

  - it: should sign the request with awscurl in iam mode
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          templateName: custom-tpl
          indexName: custom-index
          auth:
            mode: iam
            aws:
              region: us-east-1
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: 'awscurl'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '--fail-with-body'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '--service "es"'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '--region "us-east-1"'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '-X PUT'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*_index_template/RELEASE-NAME-custom-tpl.*'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '.*"index_patterns": \["custom-index"\].*'
      - notMatchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '-sfS'

  - it: should use the configured aws service in iam mode
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          auth:
            mode: iam
            aws:
              region: eu-west-1
              service: aoss
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '--service "aoss"'
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[0]
          pattern: '--region "eu-west-1"'

  - it: should not include basic-auth credentials in iam mode
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          auth:
            mode: iam
            aws:
              region: us-east-1
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers[1].env
          count: 1
      - equal:
          path: spec.template.spec.initContainers[1].env[0].name
          value: SPRING_ELASTICSEARCH_REST_URIS

  - it: should fail rendering when region is missing in iam mode
    set:
      initContainers:
        createIndexTemplate:
          enabled: true
          auth:
            mode: iam
    asserts:
      - failedTemplate:
          errorMessage: initContainers.createIndexTemplate.auth.aws.region is required when auth.mode is iam
