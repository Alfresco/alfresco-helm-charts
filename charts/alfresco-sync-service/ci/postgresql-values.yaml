nameOverride: pgsync
auth:
  username: alfresco
  password: admin
  database: alfresco-sync
primary:
  extendedConfiguration: |
    shared_buffers = 256MB
    max_connections = 100
    wal_level = minimal
    max_wal_senders = 0
    max_replication_slots = 0
    effective_cache_size = 1024GB
    log_min_messages = LOG
  resources:
    limits:
      cpu: "2"
      memory: "2Gi"
