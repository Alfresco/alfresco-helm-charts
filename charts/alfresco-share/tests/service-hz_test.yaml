---
suite: test share hazelcast service
templates:
  - service-hz.yaml
tests:
  - it: should use the default service name
    set:
      replicaCount: 2
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-share-hz
      - equal:
          path: spec.selector
          value:
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/name: alfresco-share

  - it: should render hazelcast service annotations
    set:
      replicaCount: 2
      hazelcast.service.annotations:
        service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            service.beta.kubernetes.io/aws-load-balancer-internal: "true"
