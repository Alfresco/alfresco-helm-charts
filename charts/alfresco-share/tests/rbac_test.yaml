---
suite: test share rbac resources
templates:
  - rbac.yaml
tests:
  - it: should render expected manifests
    set:
      replicaCount: 2
    asserts:
      - hasDocuments:
          count: 2

  - it: should render no manifests with replicaCount 1
    set:
      replicaCount: 1
    asserts:
      - hasDocuments:
          count: 0

  - it: should use release name in ClusterRole name
    set:
      replicaCount: 2
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.name
          value: RELEASE-NAME-NAMESPACE-share-hazelcast-cluster-role

  - it: should use release name in ClusterRoleBinding name
    set:
      replicaCount: 2
    asserts:
      - documentIndex: 1
        equal:
          path: metadata.name
          value: RELEASE-NAME-NAMESPACE-share-hazelcast-cluster-role-binding

  - it: should use different names when release name changes
    release:
      name: my-release
    set:
      replicaCount: 2
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.name
          value: my-release-NAMESPACE-share-hazelcast-cluster-role
      - documentIndex: 1
        equal:
          path: metadata.name
          value: my-release-NAMESPACE-share-hazelcast-cluster-role-binding
