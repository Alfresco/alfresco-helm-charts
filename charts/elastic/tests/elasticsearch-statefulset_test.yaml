suite: Elasticsearch StatefulSet basic tests
templates:
  - elasticsearch-statefulset.yaml
tests:
  - it: should render a StatefulSet for Elasticsearch
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: RELEASE-NAME-elastic-es
      - isNotEmpty:
          path: spec.template.spec.containers
      - equal:
          path: spec.replicas
          value: 1

  - it: should set correct container image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: elasticsearch:8.17.10

  - it: should set resource requests and not set CPU limits
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers[0].resources.requests
      - isNull:
          path: spec.template.spec.containers[0].resources.limits.cpu

  - it: should mount persistent volume
    asserts:
      - isNotEmpty:
          path: spec.template.spec.volumes
      - isNotEmpty:
          path: spec.template.spec.containers[0].volumeMounts
