apiVersion: v1
kind: Service
metadata:
  name: {{ include "elastic.es-servicename" . }}
  labels:
    {{- include "elastic.labels" . | nindent 4 }}
    app.kubernetes.io/component: elasticsearch
  {{- with .Values.elasticsearch.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 9200
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "elastic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: elasticsearch
