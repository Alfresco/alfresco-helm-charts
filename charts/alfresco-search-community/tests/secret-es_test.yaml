suite: test elasticsearch secret
templates:
  - secret-es.yaml
values:
  - values/embedded-charts-values.yaml
tests:
  - it: should base64 encode provided credentials
    set:
      index:
        username: elastic
        password: s3cr3t
    asserts:
      - equal:
          path: data.SEARCH_USERNAME
          value: ZWxhc3RpYw==
      - equal:
          path: data.SEARCH_PASSWORD
          value: czNjcjN0
  - it: should render empty credentials by default
    asserts:
      - equal:
          path: data.SEARCH_USERNAME
          value: ""
      - equal:
          path: data.SEARCH_PASSWORD
          value: ""
  - it: should not render when existingSecret is set
    set:
      index:
        existingSecret:
          name: my-es-secret
    asserts:
      - hasDocuments:
          count: 0
  - it: should render credentials under custom key names
    set:
      index:
        username: elastic
        password: s3cr3t
        existingSecret:
          keys:
            username: ES_USER
            password: ES_PASSWORD
    asserts:
      - equal:
          path: data.ES_USER
          value: ZWxhc3RpYw==
      - equal:
          path: data.ES_PASSWORD
          value: czNjcjN0
