---
suite: test connector msteams service
templates:
  - svc-connector-msteams.yaml
tests:
  - it: should render service annotations
    set:
      service.annotations:
        service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            service.beta.kubernetes.io/aws-load-balancer-internal: "true"
